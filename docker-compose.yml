services:
  postgres:
    container_name: gym-postgres
    image: postgres:18
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gym_management}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGUSER: "${POSTGRES_USERNAME:-postgres}"
      PGPASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    networks:
      - gym_management
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -p 5432 -U ${POSTGRES_USERNAME:-postgres} -d ${POSTGRES_DB:-gym_management}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    container_name: gym-redis
    image: redis:8-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    networks:
      - gym_management
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "${REDIS_PASSWORD:-password}" -h localhost -p 6379 ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    container_name: gym-management-api
    image: tomotek/gym-management-api:latest
    restart: always
    ports:
      - "${APP_PORT:-3100}:${APP_PORT:-3100}"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379
      S3_ENDPOINT: http://seaweedfs-filer:8333
      S3_PUBLIC_URL: http://seaweedfs-filer:8888/buckets/medias
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${APP_PORT:-3100}/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gym_management
    volumes:
      - logs:/app/logs

  opensearch:
    container_name: gym-opensearch
    image: opensearchproject/opensearch:2.11.0
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m"
      - DISABLE_INSTALL_DEMO_CONFIG=false
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-admin}
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT:-9201}:9200"
      - "9600:9600"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health >/dev/null || wget -qO- http://localhost:9200/_cluster/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gym_management

  opensearch-dashboards:
    container_name: gym-opensearch-dashboards
    image: opensearchproject/opensearch-dashboards:2.11.0
    volumes:
      - ./fluent-bit/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
    ports:
      - "${DASHBOARDS_PORT:-5602}:5601"
    environment:
      - OPENSEARCH_HOSTS=https://opensearch:9200
      - OPENSEARCH_USERNAME=${OPENSEARCH_ADMIN_USER:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-admin}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:5601/api/status >/dev/null || wget -qO- http://localhost:5601/api/status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gym_management

  fluent-bit-shipper:
    container_name: gym-fluent-bit-shipper
    image: fluent/fluent-bit:latest
    volumes:
      - ./fluent-bit/shipper.conf:/fluent-bit/etc/fluent-bit.conf
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf
      - ./logs:/app/logs:ro
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[f]luent-bit'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gym_management
    depends_on:
      - opensearch

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    container_name: gym-seaweedfs-master
    command: "master -ip=seaweedfs-master -mdir=/data"
    ports:
      - "${SEAWEEDFS_MASTER_PORT:-9334}:9333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9333/cluster/status >/dev/null || wget -qO- http://localhost:9333/cluster/status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - seaweedfs_data:/data
    networks:
      - gym_management

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    container_name: gym-seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -port=8080 -ip=seaweedfs-volume -dir=/data"
    depends_on:
      - seaweedfs-master
    volumes:
      - seaweedfs_data:/data
    networks:
      - gym_management
    ports:
      - "${SEAWEEDFS_VOLUME_PORT:-8081}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8080/status >/dev/null || wget -qO- http://localhost:8080/status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    container_name: gym-seaweedfs-filer
    command: 'filer -master="seaweedfs-master:9333" -s3 -s3.config="/etc/seaweedfs/s3.json"'
    ports:
      - "${SEAWEEDFS_FILER_PORT:-8889}:8888"
      - "${SEAWEEDFS_FILER_S3_PORT:-8334}:8333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8888/status >/dev/null || curl -fsS http://localhost:8888/ >/dev/null || wget -qO- http://localhost:8888/status >/dev/null || wget -qO- http://localhost:8888/ >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    networks:
      - gym_management

volumes:
  pgdata:
  redisdata:
  opensearch_data:
  seaweedfs_data:
  logs:

networks:
  gym_management:
    driver: bridge
